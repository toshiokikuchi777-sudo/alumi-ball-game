<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>アルミ玉ゲーム</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background:#0e1014;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;
  overflow-x:hidden;
  user-select:none;
}

/* ── 背景 ── */
.bg-grid {
  position:fixed; inset:0;
  background:
    linear-gradient(rgba(160,180,200,.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(160,180,200,.028) 1px, transparent 1px);
  background-size:32px 32px;
  z-index:0;
}

/* ── レイアウト ── */
#game {
  position:relative; z-index:1;
  width:100%; max-width:420px;
  padding:18px 16px 36px;
  display:flex; flex-direction:column; align-items:center; gap:13px;
}

/* ── ヘッダー ── */
#stage-name {
  font-size:20px; font-weight:700; letter-spacing:2px;
  background:linear-gradient(135deg,#b8cce0,#e8f2fc,#c8daf0);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; text-align:center;
  transition:all .4s;
  min-height:30px;
}

/* ── プログレス ── */
#prog-wrap {
  width:100%; height:5px; background:rgba(255,255,255,.05);
  border-radius:4px; overflow:hidden; border:1px solid rgba(255,255,255,.07);
}
#prog-bar {
  height:100%; width:0%; border-radius:4px;
  background:linear-gradient(90deg,#3a5878,#7aa8d0,#c8e4f8);
  box-shadow:0 0 8px rgba(120,180,230,.5);
  transition:width .4s;
}

/* ── フェーズバッジ ── */
#phase-row { display:flex; gap:8px; align-items:center; }
.ph-badge {
  display:flex; align-items:center; gap:4px;
  font-size:10px; letter-spacing:1px;
  padding:4px 10px; border-radius:20px;
  border:1px solid rgba(255,255,255,.08);
  color:rgba(255,255,255,.2);
  transition:all .4s;
}
.ph-badge.active {
  border-color:rgba(160,210,250,.4);
  color:#b8daf8;
  background:rgba(100,160,220,.1);
  box-shadow:0 0 10px rgba(100,160,220,.2);
}
.ph-badge.done {
  border-color:rgba(100,140,180,.3);
  color:rgba(140,190,230,.5);
}
.ph-sep { width:20px; height:1px; background:rgba(255,255,255,.08); }

/* ── ボールエリア ── */
#ball-wrap {
  position:relative; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
#ball-canvas { filter:drop-shadow(0 10px 30px rgba(0,0,0,.65)); }
#ball-wrap:active #ball-canvas { transform:scale(.95); transition:transform .06s; }
#tap-hint {
  position:absolute; bottom:-4px; width:100%;
  text-align:center; font-size:10px; color:rgba(255,255,255,.18);
  letter-spacing:2px; pointer-events:none;
  animation:blink 2.2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:.25} 50%{opacity:.7} }

/* ── エフェクト ── */
.float-txt {
  position:absolute; pointer-events:none;
  font-size:16px; font-weight:700; color:#c8e0f0;
  text-shadow:0 0 8px rgba(120,200,250,.9);
  animation:floatUp .85s ease-out forwards; white-space:nowrap;
}
@keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-60px) scale(.7)} }
.spark {
  position:absolute; pointer-events:none; border-radius:50%;
  animation:sparkFly .65s ease-out forwards;
}
@keyframes sparkFly { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.05)} }

/* ── スタッツ ── */
#stats { width:100%; display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.stat-card {
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  border-radius:10px; padding:9px 8px; text-align:center;
}
.stat-lbl { font-size:9px; color:rgba(255,255,255,.28); letter-spacing:1px; text-transform:uppercase; }
.stat-val { font-size:19px; font-weight:700; color:#aacce8; margin-top:2px; }

/* ── アップグレード ── */
#upg-title { width:100%; font-size:9px; letter-spacing:3px; color:rgba(255,255,255,.18); text-transform:uppercase; padding-left:2px; }
#upgrades { width:100%; display:flex; flex-direction:column; gap:7px; }
.upg-row {
  background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07);
  border-radius:10px; padding:11px 13px; display:flex; align-items:center; gap:10px;
  cursor:pointer; transition:background .15s,border-color .15s;
}
.upg-row:hover:not(.locked) { background:rgba(100,160,220,.1); border-color:rgba(120,180,230,.3); }
.upg-row.locked { opacity:.28; cursor:not-allowed; }
.upg-icon { font-size:20px; flex-shrink:0; }
.upg-info { flex:1; }
.upg-name { font-size:13px; font-weight:700; color:#c0d8f0; }
.upg-desc { font-size:10px; color:rgba(255,255,255,.3); margin-top:1px; }
.upg-cost { font-size:12px; font-weight:700; color:#80b0d8; white-space:nowrap; }

/* ── バナー ── */
#banner {
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  z-index:100; pointer-events:none; opacity:0;
}
#banner.show { animation:bannerAnim 2.8s ease-out forwards; }
@keyframes bannerAnim { 0%{opacity:0} 12%{opacity:1} 70%{opacity:1} 100%{opacity:0} }
#banner-inner {
  text-align:center; padding:26px 44px;
  background:rgba(8,12,18,.88); border-radius:18px;
  border:1px solid rgba(120,180,230,.35);
  box-shadow:0 0 50px rgba(80,160,230,.15);
}
#banner-sub { font-size:10px; letter-spacing:4px; color:rgba(160,210,250,.45); text-transform:uppercase; margin-bottom:8px; }
#banner-txt { font-size:28px; font-weight:700; letter-spacing:3px; color:#ddeeff; text-shadow:0 0 20px rgba(120,200,255,.7); }
</style>
</head>
<body>
<div class="bg-grid"></div>

<div id="game">
  <div id="stage-name">ペラペラのアルミホイル</div>
  <div id="prog-wrap"><div id="prog-bar"></div></div>

  <div id="phase-row">
    <div class="ph-badge active" id="ph0">🤲 丸める</div>
    <div class="ph-sep"></div>
    <div class="ph-badge" id="ph1">🔨 たたく</div>
    <div class="ph-sep"></div>
    <div class="ph-badge" id="ph2">✨ 磨く</div>
  </div>

  <div id="ball-wrap">
    <canvas id="ball-canvas" width="240" height="240"></canvas>
    <div id="tap-hint">TAP TO CRUMPLE</div>
  </div>

  <div id="stats">
    <div class="stat-card"><div class="stat-lbl">ネジ</div><div class="stat-val" id="sv-bolt">0</div></div>
    <div class="stat-card"><div class="stat-lbl">/秒</div><div class="stat-val" id="sv-aps">0</div></div>
    <div class="stat-card"><div class="stat-lbl">完成度</div><div class="stat-val" id="sv-pct">0%</div></div>
  </div>

  <div id="upg-title">UPGRADES</div>
  <div id="upgrades"></div>
</div>

<div id="banner">
  <div id="banner-inner">
    <div id="banner-sub">STAGE CLEAR</div>
    <div id="banner-txt"></div>
  </div>
</div>

<script>
// ──────────────────────────────────────────
//  UTILS
// ──────────────────────────────────────────
function lerp(a,b,t){ return a+(b-a)*t; }
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
function easeInOut(t){ return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2; }

// 固定ノイズ
const NOISE = Array.from({length:512},()=>Math.random());
function ns(i){ return NOISE[((Math.abs(Math.floor(i))%512)+512)%512]; }

// ──────────────────────────────────────────
//  STATE
// ──────────────────────────────────────────
const S = {
  bolt:0, totalBolt:0, taps:0,
  perTap:1, perSec:0,
  stageIdx:0,
  upgrades:{},
};

// ──────────────────────────────────────────
//  STAGES
//  morph: 0=ペラペラ  ~0.4=くしゃくしゃ  ~0.65=球体形成  1.0=鏡面完成
// ──────────────────────────────────────────
const STAGES = [
  { name:'ペラペラのアルミホイル',   threshold:0,      morph:0.00, phase:0 },
  { name:'ちょっとくしゃっとなった', threshold:30,     morph:0.12, phase:0 },
  { name:'もっとくしゃっ',          threshold:90,     morph:0.24, phase:0 },
  { name:'まとまりかけてきた',       threshold:220,    morph:0.38, phase:0 },
  { name:'ぐりぐり丸めてる',        threshold:550,    morph:0.52, phase:0 },
  { name:'なんとなく球っぽい',       threshold:1300,   morph:0.64, phase:1 },
  { name:'球体ができてきた！',       threshold:3000,   morph:0.75, phase:1 },
  { name:'金槌でたたいていく',       threshold:7000,   morph:0.85, phase:1 },
  { name:'表面がなめらかに',         threshold:15000,  morph:0.93, phase:2 },
  { name:'鏡面仕上げ完成！',         threshold:35000,  morph:1.00, phase:2 },
];

// ──────────────────────────────────────────
//  UPGRADES
// ──────────────────────────────────────────
const UPGRADES = [
  { id:'u0', icon:'🤲', name:'両手でぎゅっと',     desc:'+2/タップ',            base:25,   mult:1.55, effect(){ S.perTap+=2; } },
  { id:'u1', icon:'🔄', name:'くるくる回す',        desc:'+1/秒 自動',           base:70,   mult:1.6,  effect(){ S.perSec+=1; } },
  { id:'u2', icon:'💪', name:'力を込めて押す',      desc:'+6/タップ',            base:180,  mult:1.55, effect(){ S.perTap+=6; } },
  { id:'u3', icon:'🔨', name:'小槌でたたく',        desc:'+4/秒 自動',           base:420,  mult:1.6,  effect(){ S.perSec+=4; } },
  { id:'u4', icon:'⚙️', name:'型押し機にかける',    desc:'+18/タップ',           base:1000, mult:1.55, effect(){ S.perTap+=18; } },
  { id:'u5', icon:'🔩', name:'電動バイブレーター',  desc:'+12/秒 自動',          base:2200, mult:1.6,  effect(){ S.perSec+=12; } },
  { id:'u6', icon:'📄', name:'紙やすり#400',        desc:'+45/タップ',           base:5500, mult:1.55, effect(){ S.perTap+=45; } },
  { id:'u7', icon:'💧', name:'ウェットサンディング', desc:'+32/秒 自動',         base:11000,mult:1.6,  effect(){ S.perSec+=32; } },
  { id:'u8', icon:'💎', name:'ピカール鏡面仕上げ',  desc:'+100/タップ',          base:24000,mult:1.55, effect(){ S.perTap+=100; } },
];

// ──────────────────────────────────────────
//  CANVAS
// ──────────────────────────────────────────
const bc = document.getElementById('ball-canvas');
const ctx = bc.getContext('2d');
const CW=240, CH=240, CX=120, CY=120;
let animT = 0;
// インタラクティブ反応用の物理変数
let pulse=0, pVel=0;     // squash & stretch（ぐにゃっと潰れて弾む）
let spin=0, spinVel=0;   // ぐりぐり回転
let tilt=0, tiltVel=0;   // 押した方向への傾き
let dent=0, dentX=0, dentY=0; // クリック位置のへこみ

// ──────────────────────────────────────────
//  MORPH COMPUTE
// ──────────────────────────────────────────
function getMorph(){
  const n=STAGES.length;
  let ci=0;
  for(let i=n-1;i>=0;i--){ if(S.totalBolt>=STAGES[i].threshold){ci=i;break;} }
  const ni=Math.min(ci+1,n-1);
  if(ni===ci) return STAGES[ci].morph;
  const frac=clamp((S.totalBolt-STAGES[ci].threshold)/(STAGES[ni].threshold-STAGES[ci].threshold),0,1);
  return lerp(STAGES[ci].morph,STAGES[ni].morph,frac);
}

// ──────────────────────────────────────────
//  DRAW: FLAT FOIL
//  crT: 0=完全にフラット, 1=丸まり始め寸前
// ──────────────────────────────────────────
function drawFlatFoil(crT){
  // サイズはくしゃっとなるほど小さく
  const W = lerp(175, 110, easeInOut(crT));
  const H = lerp(140,  88, easeInOut(crT));

  // 4コーナー（パースをつけた台形）
  let p = [
    [CX-W/2+4,  CY-H/2+10],  // TL
    [CX+W/2-4,  CY-H/2-10],  // TR
    [CX+W/2+6,  CY+H/2-8 ],  // BR
    [CX-W/2-6,  CY+H/2+8 ],  // BL
  ];

  // くしゃっとした変形
  if(crT>0.05){
    const c=Math.pow((crT-0.05)/0.95,1.2);
    const amp=c*32;
    // 角を内側に畳み込む
    p[0]=[p[0][0]+amp*0.7+Math.sin(animT*.4)*amp*.2, p[0][1]+amp*0.9+Math.sin(animT*.3+1)*amp*.15];
    p[1]=[p[1][0]-amp*0.5+Math.sin(animT*.35+2)*amp*.15, p[1][1]+amp*0.4];
    p[2]=[p[2][0]-amp*0.3, p[2][1]-amp*0.5+Math.sin(animT*.45+3)*amp*.2];
    p[3]=[p[3][0]+amp*0.2, p[3][1]-amp*0.6];
    // 中間点を追加して凸凹感
    if(c>0.3){
      const w=(c-0.3)/0.7;
      p[1]=[lerp(p[1][0],CX,w*.15), lerp(p[1][1],CY,w*.1)];
      p[3]=[lerp(p[3][0],CX,w*.1), lerp(p[3][1],CY,w*.12)];
    }
  }

  // 影
  ctx.save();
  const sR=W*0.45*(1-crT*0.4);
  const sg=ctx.createRadialGradient(CX+4,CY+H/2+16,0,CX,CY+H/2+12,sR);
  sg.addColorStop(0,'rgba(0,0,0,.35)'); sg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sg;
  ctx.beginPath(); ctx.ellipse(CX,CY+H/2+14,sR,sR*0.22,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // ホイル本体
  ctx.save();
  ctx.beginPath();
  // ベジェで少し波打たせる（くしゃ感）
  if(crT<0.15){
    ctx.moveTo(p[0][0],p[0][1]);
    ctx.lineTo(p[1][0],p[1][1]);
    ctx.lineTo(p[2][0],p[2][1]);
    ctx.lineTo(p[3][0],p[3][1]);
  } else {
    const c=Math.min((crT-.15)/.85,1);
    const wv=c*12;
    const mx01=[(p[0][0]+p[1][0])/2,(p[0][1]+p[1][1])/2];
    const mx12=[(p[1][0]+p[2][0])/2,(p[1][1]+p[2][1])/2];
    const mx23=[(p[2][0]+p[3][0])/2,(p[2][1]+p[3][1])/2];
    const mx30=[(p[3][0]+p[0][0])/2,(p[3][1]+p[0][1])/2];
    ctx.moveTo(p[0][0],p[0][1]);
    ctx.quadraticCurveTo(mx01[0]+Math.sin(animT*.5)*wv, mx01[1]-wv*.5, p[1][0],p[1][1]);
    ctx.quadraticCurveTo(mx12[0]-wv*.3, mx12[1]+Math.sin(animT*.6+1)*wv, p[2][0],p[2][1]);
    ctx.quadraticCurveTo(mx23[0]+wv*.2, mx23[1]+wv*.4, p[3][0],p[3][1]);
    ctx.quadraticCurveTo(mx30[0]-Math.sin(animT*.4+2)*wv*.5, mx30[1]-wv*.3, p[0][0],p[0][1]);
  }
  ctx.closePath();

  // メタリックグラデーション（銀色のアルミホイル感）
  const grd=ctx.createLinearGradient(p[0][0],p[0][1],p[2][0],p[2][1]);
  grd.addColorStop(0.00,'#d0dce8');
  grd.addColorStop(0.18,'#edf4fc');
  grd.addColorStop(0.35,'#f8fcff');
  grd.addColorStop(0.52,'#dde8f4');
  grd.addColorStop(0.70,'#eef4fc');
  grd.addColorStop(0.85,'#c8d8ec');
  grd.addColorStop(1.00,'#b0c4d8');
  ctx.fillStyle=grd; ctx.fill();

  // ── 細かいメッシュグリッド ──
  const GRID=22;
  ctx.save();
  ctx.clip();

  // 縦横グリッド線（バイリニア補間で台形に合わせる）
  ctx.strokeStyle='rgba(80,110,150,0.22)'; ctx.lineWidth=0.55;
  for(let i=0;i<=GRID;i++){
    const f=i/GRID;
    // 横線
    const lx0=lerp(p[0][0],p[3][0],f), ly0=lerp(p[0][1],p[3][1],f);
    const lx1=lerp(p[1][0],p[2][0],f), ly1=lerp(p[1][1],p[2][1],f);
    ctx.beginPath(); ctx.moveTo(lx0,ly0); ctx.lineTo(lx1,ly1); ctx.stroke();
    // 縦線
    const vx0=lerp(p[0][0],p[1][0],f), vy0=lerp(p[0][1],p[1][1],f);
    const vx1=lerp(p[3][0],p[2][0],f), vy1=lerp(p[3][1],p[2][1],f);
    ctx.beginPath(); ctx.moveTo(vx0,vy0); ctx.lineTo(vx1,vy1); ctx.stroke();
  }

  // 対角線（より細かいメッシュ感）
  ctx.strokeStyle='rgba(80,110,150,0.10)'; ctx.lineWidth=0.4;
  for(let i=0;i<=GRID;i+=2){
    const f=i/GRID;
    const ax=lerp(p[0][0],p[1][0],f), ay=lerp(p[0][1],p[1][1],f);
    const bx=lerp(p[3][0],p[2][0],f), by=lerp(p[3][1],p[2][1],f);
    const cx2=lerp(p[0][0],p[3][0],f), cy2=lerp(p[0][1],p[3][1],f);
    const dx2=lerp(p[1][0],p[2][0],f), dy2=lerp(p[1][1],p[2][1],f);
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx2,cy2); ctx.lineTo(dx2,dy2); ctx.stroke();
  }

  // くしゃっとした折り目線
  if(crT>0.1){
    const cr=(crT-.1)/.9;
    ctx.strokeStyle=`rgba(60,90,130,${cr*.35})`; ctx.lineWidth=0.8;
    for(let i=0;i<10;i++){
      const ang=ns(i*7.3)*Math.PI*2;
      const r0=Math.min(W,H)*.35*ns(i*13.1);
      const r1=Math.min(W,H)*.45*ns(i*19.7);
      ctx.beginPath();
      ctx.moveTo(CX+Math.cos(ang)*r0, CY+Math.sin(ang)*r0);
      ctx.lineTo(CX+Math.cos(ang+ns(i*5.3)*1.4-.7)*r1, CY+Math.sin(ang+ns(i*5.3)*1.4-.7)*r1);
      ctx.stroke();
    }
  }

  ctx.restore(); // clip解除

  // 移動ハイライト（流れる反射）
  const hlX=CX-W*.3+(Math.sin(animT*.25)+1)*W*.5;
  const hlG=ctx.createLinearGradient(hlX-25,0,hlX+25,0);
  hlG.addColorStop(0,'rgba(255,255,255,0)');
  hlG.addColorStop(.5,`rgba(255,255,255,${.18+crT*.08})`);
  hlG.addColorStop(1,'rgba(255,255,255,0)');
  ctx.save(); ctx.clip();
  ctx.fillStyle=hlG; ctx.fillRect(p[0][0]-5,p[0][1]-5,W+10,H+10);
  ctx.restore();

  // 主ハイライト
  const hl=ctx.createRadialGradient(CX-W*.22,CY-H*.22,0,CX,CY,W*.55);
  hl.addColorStop(0,`rgba(255,255,255,${.45-.2*crT})`);
  hl.addColorStop(.5,`rgba(255,255,255,${.06-.03*crT})`);
  hl.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=hl; ctx.fill();

  // 縁
  ctx.strokeStyle='rgba(160,200,240,.25)'; ctx.lineWidth=1; ctx.stroke();
  ctx.restore();
}

// ──────────────────────────────────────────
//  DRAW: CRUMPLING (くしゃっと丸まる)
//  bT: 0=丸まり始め, 1=ほぼ球体
// ──────────────────────────────────────────
function drawCrumpling(bT){
  const R=lerp(50, 86, easeInOut(bT));
  const spiky=lerp(.52,.10,bT);

  // 影
  ctx.save();
  const sg=ctx.createRadialGradient(CX+5,CY+R*.82,0,CX,CY+R*.65,R*.9);
  sg.addColorStop(0,'rgba(0,0,0,.45)'); sg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sg;
  ctx.beginPath(); ctx.ellipse(CX,CY+R*.88,R*.78,R*.18,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // くしゃっとした不規則ブロブ
  ctx.save();
  const N=32;
  ctx.beginPath();
  for(let i=0;i<=N;i++){
    const ang=(i/N)*Math.PI*2;
    const noiseV=(ns(i*11.7+17)*2-1);
    const wobble=Math.sin(animT*.7+i*1.1)*(1-bT)*.08;
    const r=R*(1+spiky*noiseV+wobble);
    const x=CX+Math.cos(ang)*r, y=CY+Math.sin(ang)*r;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();

  // ベースグラデ（メタリックシルバー）
  const bg=ctx.createRadialGradient(CX-R*.32,CY-R*.32,0,CX,CY,R*1.15);
  bg.addColorStop(0,  `hsl(210,14%,${Math.round(72+bT*12)}%)`);
  bg.addColorStop(.35,`hsl(210,11%,${Math.round(52+bT*14)}%)`);
  bg.addColorStop(.72,`hsl(210,9%, ${Math.round(34+bT*10)}%)`);
  bg.addColorStop(1,  `hsl(210,8%, ${Math.round(20+bT*8) }%)`);
  ctx.fillStyle=bg; ctx.fill();

  ctx.clip();

  // グリッド残像（初期のみ）
  if(bT<0.35){
    const ga=(0.35-bT)/0.35;
    ctx.globalAlpha=ga*.22;
    ctx.strokeStyle='rgba(80,110,150,0.8)'; ctx.lineWidth=0.55;
    const gr=16;
    for(let i=0;i<=gr;i++){
      const f=i/gr;
      const y=CY-R+f*R*2;
      ctx.beginPath(); ctx.moveTo(CX-R,y); ctx.lineTo(CX+R,y); ctx.stroke();
      const x=CX-R+f*R*2;
      ctx.beginPath(); ctx.moveTo(x,CY-R); ctx.lineTo(x,CY+R); ctx.stroke();
    }
    ctx.globalAlpha=1;
  }

  // 折り目線
  ctx.strokeStyle=`rgba(60,90,130,${lerp(.45,.18,bT)})`; ctx.lineWidth=0.8;
  for(let i=0;i<20;i++){
    const ang=ns(i*7.1)*Math.PI*2;
    const r0=R*ns(i*13.3)*.85;
    const r1=R*ns(i*19.9)*.92;
    const a1=ang+(ns(i*5.7)*2-1)*1.4;
    ctx.beginPath();
    ctx.moveTo(CX+Math.cos(ang)*r0, CY+Math.sin(ang)*r0);
    ctx.lineTo(CX+Math.cos(a1)*r1,  CY+Math.sin(a1)*r1);
    ctx.stroke();
  }

  // ハイライト
  const hl=ctx.createRadialGradient(CX-R*.36,CY-R*.36,0,CX-R*.36,CY-R*.36,R*.8);
  hl.addColorStop(0,`rgba(255,255,255,${.35+bT*.25})`);
  hl.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=hl; ctx.fillRect(CX-R*1.3,CY-R*1.3,R*2.6,R*2.6);

  ctx.restore();
}

// ──────────────────────────────────────────
//  DRAW: SPHERE (球体〜鏡面)
//  pT: 0=でこぼこ球体, 1=完全な鏡面
// ──────────────────────────────────────────
function drawSphere(pT){
  const R=88;

  // 影
  const sg=ctx.createRadialGradient(CX+6,CY+R*.73,0,CX,CY+R*.6,R*.88);
  sg.addColorStop(0,'rgba(0,0,0,.52)'); sg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sg;
  ctx.beginPath(); ctx.ellipse(CX,CY+R*.78,R*.82,R*.2,0,0,Math.PI*2); ctx.fill();

  // ベース球体
  const base=ctx.createRadialGradient(CX-R*.3,CY-R*.3,0,CX,CY,R);
  const bl=Math.round(68+pT*28);
  base.addColorStop(0,  `hsl(210,16%,${bl+28}%)`);
  base.addColorStop(.38,`hsl(210,13%,${bl+12}%)`);
  base.addColorStop(.75,`hsl(210,10%,${bl-8 }%)`);
  base.addColorStop(1,  `hsl(210,8%, ${bl-24}%)`);

  ctx.save();
  ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2);
  ctx.fillStyle=base; ctx.fill();
  ctx.clip();

  // 折り目残像（粗い球体時）
  if(pT<0.45){
    const fa=(0.45-pT)/0.45;
    ctx.globalAlpha=fa*.38;
    ctx.strokeStyle='rgba(60,90,130,.7)'; ctx.lineWidth=0.9;
    for(let i=0;i<18;i++){
      const ang=ns(i*7.3)*Math.PI*2;
      const r0=R*ns(i*11.1)*.9, r1=R*ns(i*19.7)*.95;
      const a1=ang+(ns(i*5.3)*2-1)*1.5;
      ctx.beginPath();
      ctx.moveTo(CX+Math.cos(ang)*r0, CY+Math.sin(ang)*r0);
      ctx.lineTo(CX+Math.cos(a1)*r1,  CY+Math.sin(a1)*r1);
      ctx.stroke();
    }
    ctx.globalAlpha=1;
  }

  // メタリックバンド
  for(let i=0;i<5;i++){
    const ang=(i/5)*Math.PI+animT*.1;
    const g=ctx.createLinearGradient(
      CX+Math.cos(ang)*R*1.1, CY+Math.sin(ang)*R*1.1,
      CX-Math.cos(ang)*R*1.1, CY-Math.sin(ang)*R*1.1
    );
    const ba=.04+pT*.09;
    g.addColorStop(0,'rgba(255,255,255,0)');
    g.addColorStop(.5,`rgba(255,255,255,${ba})`);
    g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=g; ctx.fillRect(CX-R,CY-R,R*2,R*2);
  }

  // 鏡面反射（高磨き時）
  if(pT>0.4){
    const pa=(pT-.4)/.6;
    const sky=ctx.createLinearGradient(0,CY-R,0,CY);
    sky.addColorStop(0,`rgba(150,195,240,${pa*.22})`);
    sky.addColorStop(1,'rgba(150,195,240,0)');
    ctx.fillStyle=sky; ctx.fillRect(CX-R,CY-R,R*2,R);
    const fl=ctx.createLinearGradient(0,CY,0,CY+R);
    fl.addColorStop(0,'rgba(15,25,45,0)');
    fl.addColorStop(1,`rgba(8,15,35,${pa*.32})`);
    ctx.fillStyle=fl; ctx.fillRect(CX-R,CY,R*2,R);
  }

  // メインハイライト
  const hl=ctx.createRadialGradient(CX-R*.34,CY-R*.38,0,CX-R*.34,CY-R*.38,R*.72);
  hl.addColorStop(0,`rgba(255,255,255,${.14+pT*.58})`);
  hl.addColorStop(.6,`rgba(240,248,255,${pT*.14})`);
  hl.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=hl; ctx.fillRect(CX-R,CY-R,R*2,R*2);

  // 小ハイライト点
  if(pT>.18){
    const sp=ctx.createRadialGradient(CX-R*.28,CY-R*.41,0,CX-R*.28,CY-R*.41,R*.1);
    sp.addColorStop(0,`rgba(255,255,255,${pT*.95})`);
    sp.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=sp; ctx.fillRect(CX-R,CY-R,R*2,R*2);
  }

  // きらめき星（高磨き）
  if(pT>.55){
    const sa=(pT-.55)/.45;
    for(let i=0;i<6;i++){
      const a=animT*.85+i*(Math.PI*2/6);
      const d=R*(.28+.42*Math.sin(animT*.65+i*1.2));
      const sx=CX+Math.cos(a)*d, sy=CY+Math.sin(a)*d;
      const sa2=(Math.sin(animT*2.5+i)*.5+.5)*sa*.65;
      drawStar(ctx,sx,sy,4,sa2);
    }
  }

  ctx.restore();

  // リム
  ctx.save();
  ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2);
  ctx.strokeStyle=`rgba(200,220,240,${.04+pT*.1})`; ctx.lineWidth=1.5; ctx.stroke();
  ctx.restore();
}

function drawStar(c,x,y,r,a){
  c.save(); c.globalAlpha=a; c.beginPath();
  for(let i=0;i<8;i++){
    const ang=(i/8)*Math.PI*2; const rr=i%2===0?r:r*.28;
    i===0?c.moveTo(x+Math.cos(ang)*rr,y+Math.sin(ang)*rr)
         :c.lineTo(x+Math.cos(ang)*rr,y+Math.sin(ang)*rr);
  }
  c.closePath(); c.fillStyle='#e8f6ff'; c.fill(); c.restore();
}

// ──────────────────────────────────────────
//  MAIN DRAW DISPATCH
// ──────────────────────────────────────────
function drawScene(){
  const morph=getMorph();
  ctx.clearRect(0,0,CW,CH);

  // クリック反応の変形をボール全体に適用
  const k=pulse*0.06;            // squash振幅
  ctx.save();
  ctx.translate(CX, CY - k*28);  // 弾む上下動
  ctx.rotate(spin + tilt*0.22);  // 回転＋傾き
  ctx.scale(1+k, 1-k);           // 横に膨らみ縦に潰れる
  ctx.translate(-CX,-CY);

  if(morph<=0.40){
    // フラット〜くしゃっと段階
    const crT=morph/0.40;
    drawFlatFoil(crT);
  } else if(morph<=0.65){
    // くしゃっと丸まる段階
    const bT=(morph-0.40)/0.25;
    drawCrumpling(bT);
  } else {
    // 球体〜鏡面段階
    const pT=(morph-0.65)/0.35;
    drawSphere(pT);
  }

  ctx.restore();

  // クリック位置のへこみ（押し込み感）
  if(dent>0.01){
    ctx.save();
    const dg=ctx.createRadialGradient(dentX,dentY,0,dentX,dentY,28);
    dg.addColorStop(0,`rgba(20,30,50,${dent*0.35})`);
    dg.addColorStop(.6,`rgba(20,30,50,${dent*0.12})`);
    dg.addColorStop(1,'rgba(20,30,50,0)');
    ctx.fillStyle=dg;
    ctx.beginPath(); ctx.arc(dentX,dentY,28,0,Math.PI*2); ctx.fill();
    // へこみのフチに光
    ctx.strokeStyle=`rgba(255,255,255,${dent*0.3})`;
    ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(dentX,dentY,12,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }
}

// ──────────────────────────────────────────
//  AUDIO
// ──────────────────────────────────────────
let audioCtx=null;
function initAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }
function playHit(){
  if(!audioCtx) return;
  const morph=getMorph();
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  if(morph<0.40){
    // くしゃっ — 低めのノイズ
    osc.type='sawtooth';
    osc.frequency.setValueAtTime(150+Math.random()*60, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime+.09);
    gain.gain.setValueAtTime(.05, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime+.12);
  } else if(morph<0.65){
    // ぎゅっ — ミッドレンジ
    osc.type='square';
    osc.frequency.setValueAtTime(400+Math.random()*150, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime+.07);
    gain.gain.setValueAtTime(.06, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime+.1);
  } else {
    // たたく/磨く — 金属音
    osc.type='triangle';
    osc.frequency.setValueAtTime(900+Math.random()*250, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime+.06);
    gain.gain.setValueAtTime(.055, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime+.09);
  }
  osc.start(); osc.stop(audioCtx.currentTime+.18);
}

// ──────────────────────────────────────────
//  PARTICLES
// ──────────────────────────────────────────
const bw=document.getElementById('ball-wrap');

function spawnSparks(ex,ey){
  const morph=getMorph();
  const colors=morph<0.4
    ? ['#c8d8e8','#e0eaf8','#a0b8d0']
    : morph<0.65
    ? ['#b0c8e0','#d8ecf8','#90a8c0']
    : ['#d0e8f8','#eef6ff','#fff8f0'];
  for(let i=0;i<8;i++){
    const el=document.createElement('div'); el.className='spark';
    const ang=Math.random()*Math.PI*2;
    const dist=30+Math.random()*(morph<0.4?50:60);
    const sz=morph>0.65?(1+Math.random()*3):(2+Math.random()*5);
    el.style.cssText=`width:${sz}px;height:${sz}px;left:${ex}px;top:${ey}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --dx:${Math.cos(ang)*dist}px;--dy:${Math.sin(ang)*dist-22}px;
      box-shadow:0 0 4px ${colors[0]};`;
    bw.appendChild(el); setTimeout(()=>el.remove(),680);
  }
}

function spawnFloat(ex,ey,val){
  const el=document.createElement('div'); el.className='float-txt';
  el.textContent='+'+val;
  el.style.left=(ex-18)+'px'; el.style.top=(ey-10)+'px';
  bw.appendChild(el); setTimeout(()=>el.remove(),870);
}

// ──────────────────────────────────────────
//  CLICK
// ──────────────────────────────────────────
bw.addEventListener('pointerdown',e=>{
  initAudio();
  const rect=bw.getBoundingClientRect();
  const ex=e.clientX-rect.left, ey=e.clientY-rect.top;
  S.bolt+=S.perTap; S.totalBolt+=S.perTap; S.taps++;
  // ── インタラクティブ物理リアクション ──
  pVel += 10;                                       // ぐにゃっと潰れる撃力
  spinVel += (ex<CX?-1:1)*(3+Math.random()*2.5);    // クリック側へぐりぐり回転
  tiltVel += (ex-CX)/CX * 5;                         // 押した方向へ傾く
  dent=1; dentX=ex; dentY=ey;                        // へこみ発生
  playHit(); spawnSparks(ex,ey); spawnFloat(ex,ey,S.perTap);
  checkStage(); updateUI();
});

// ──────────────────────────────────────────
//  AUTO
// ──────────────────────────────────────────
setInterval(()=>{
  if(S.perSec>0){ S.bolt+=S.perSec; S.totalBolt+=S.perSec; checkStage(); updateUI(); }
},1000);

// ──────────────────────────────────────────
//  STAGE CHECK
// ──────────────────────────────────────────
function checkStage(){
  let next=S.stageIdx;
  for(let i=STAGES.length-1;i>=0;i--){ if(S.totalBolt>=STAGES[i].threshold){next=i;break;} }
  if(next>S.stageIdx){ S.stageIdx=next; showBanner(STAGES[next].name); }
}
function showBanner(name){
  const el=document.getElementById('banner');
  document.getElementById('banner-txt').textContent=name;
  el.className=''; void el.offsetWidth; el.className='show';
}

// ──────────────────────────────────────────
//  UPGRADES UI
// ──────────────────────────────────────────
function buildUpgUI(){
  const c=document.getElementById('upgrades'); c.innerHTML='';
  for(const u of UPGRADES){
    const cnt=S.upgrades[u.id]||0;
    const cost=Math.floor(u.base*Math.pow(u.mult,cnt));
    const locked=S.bolt<cost;
    const row=document.createElement('div');
    row.className='upg-row'+(locked?' locked':''); row.id='upg-'+u.id;
    row.innerHTML=`
      <div class="upg-icon">${u.icon}</div>
      <div class="upg-info">
        <div class="upg-name">${u.name}${cnt>0?` <span style="font-size:10px;color:#7aa8d0;">Lv.${cnt}</span>`:''}</div>
        <div class="upg-desc">${u.desc}</div>
      </div>
      <div class="upg-cost">🔩 ${fmt(cost)}</div>`;
    row.addEventListener('click',()=>{
      const c2=S.upgrades[u.id]||0;
      const cost2=Math.floor(u.base*Math.pow(u.mult,c2));
      if(S.bolt<cost2) return;
      S.bolt-=cost2; S.upgrades[u.id]=c2+1; u.effect();
      buildUpgUI(); updateUI();
    });
    c.appendChild(row);
  }
}

function refreshUpgLocked(){
  for(const u of UPGRADES){
    const el=document.getElementById('upg-'+u.id); if(!el) continue;
    const cnt=S.upgrades[u.id]||0;
    const cost=Math.floor(u.base*Math.pow(u.mult,cnt));
    S.bolt>=cost?el.classList.remove('locked'):el.classList.add('locked');
  }
}

// ──────────────────────────────────────────
//  UI UPDATE
// ──────────────────────────────────────────
const maxTotal=STAGES[STAGES.length-1].threshold;

function updateUI(){
  document.getElementById('sv-bolt').textContent=fmt(S.bolt);
  document.getElementById('sv-aps').textContent=fmt(S.perSec);
  const pct=Math.min(100,Math.round(S.totalBolt/maxTotal*100));
  document.getElementById('sv-pct').textContent=pct+'%';
  document.getElementById('stage-name').textContent=STAGES[S.stageIdx].name;

  const cur=STAGES[S.stageIdx], nxt=STAGES[Math.min(S.stageIdx+1,STAGES.length-1)];
  if(nxt!==cur){
    const p=(S.totalBolt-cur.threshold)/(nxt.threshold-cur.threshold)*100;
    document.getElementById('prog-bar').style.width=Math.min(100,Math.max(0,p))+'%';
  } else {
    document.getElementById('prog-bar').style.width='100%';
  }

  // フェーズバッジ
  const curPhase=STAGES[S.stageIdx].phase;
  ['ph0','ph1','ph2'].forEach((id,i)=>{
    const el=document.getElementById(id);
    if(i<curPhase) el.className='ph-badge done';
    else if(i===curPhase) el.className='ph-badge active';
    else el.className='ph-badge';
  });

  // TAPヒント更新
  const morph=getMorph();
  const hints=['TAP TO CRUMPLE','TAP TO BALL UP','TAP TO HAMMER','TAP TO POLISH'];
  const hi=morph<.4?0:morph<.65?1:morph<.85?2:3;
  document.getElementById('tap-hint').textContent=hints[hi];

  refreshUpgLocked();
}

function fmt(n){
  if(n>=1e9) return (n/1e9).toFixed(1)+'B';
  if(n>=1e6) return (n/1e6).toFixed(1)+'M';
  if(n>=1e3) return (n/1e3).toFixed(1)+'K';
  return Math.floor(n)+'';
}

// ──────────────────────────────────────────
//  MAIN LOOP
// ──────────────────────────────────────────
let last=0;
function loop(ts){
  const dt=Math.min((ts-last)/1000,.05); last=ts; animT+=dt;

  // ── squash & stretch バネ（潰れて弾む）──
  pVel += (-pulse)*70*dt;
  pVel *= Math.pow(0.0008, dt);
  pulse += pVel*dt;

  // ── 回転（摩擦で減衰）──
  spin += spinVel*dt;
  spinVel *= Math.pow(0.012, dt);
  if(Math.abs(spinVel)<0.0004) spinVel=0;

  // ── 傾き（バネで戻る）──
  tiltVel += (-tilt)*55*dt;
  tiltVel *= Math.pow(0.0015, dt);
  tilt += tiltVel*dt;

  // ── へこみフェード ──
  dent += (0-dent)*Math.min(1,dt*7);

  drawScene();
  requestAnimationFrame(loop);
}

buildUpgUI(); updateUI();
requestAnimationFrame(loop);
</script>
