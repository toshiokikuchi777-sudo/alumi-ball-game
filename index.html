<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>アルミ玉 3D -鏡面への道-</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:none; }
html,body { overscroll-behavior:none; background:#0a0c10; }
body {
  min-height:100vh; display:flex; flex-direction:column; align-items:center;
  font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;
  overflow-x:hidden; user-select:none; color:#fff;
}
.bg { position:fixed; inset:0; z-index:0; background:radial-gradient(ellipse at 50% 30%, #161b22 0%, #08090d 75%); }

#game { position:relative; z-index:1; width:100%; max-width:430px; padding:12px 16px 30px; display:flex; flex-direction:column; align-items:center; gap:10px; }

#phase-pill { font-size:10px; letter-spacing:2px; padding:4px 14px; border-radius:20px; border:1px solid rgba(255,255,255,.12); color:#cddcea; background:rgba(255,255,255,.04); text-transform:uppercase; transition:all .35s; }
#phase-pill.crumple { border-color:rgba(200,205,215,.4); color:#e2e8f0; background:rgba(185,195,210,.1); }
#phase-pill.forge { border-color:rgba(224,176,112,.4); color:#e8c088; background:rgba(200,140,70,.1); }
#phase-pill.polish { border-color:rgba(140,200,250,.4); color:#a0d0f8; background:rgba(80,160,230,.1); }
#phase-pill.done { border-color:rgba(180,255,200,.5); color:#b8ffc8; background:rgba(80,230,140,.12); }

#stage-name { font-size:17px; font-weight:700; letter-spacing:1px; background:linear-gradient(135deg,#b8cce0,#eef6ff,#c8daf0); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; text-align:center; min-height:24px; transition:all .35s; }

#meters { width:100%; display:flex; flex-direction:column; gap:6px; }
.meter-row { display:flex; align-items:center; gap:8px; }
.meter-ico { font-size:13px; width:18px; text-align:center; }
.meter-lbl { font-size:10px; color:rgba(255,255,255,.4); width:46px; }
.meter-track { flex:1; height:9px; background:rgba(255,255,255,.06); border-radius:6px; overflow:hidden; border:1px solid rgba(255,255,255,.07); position:relative; }
.meter-fill { height:100%; width:0%; border-radius:6px; transition:width .25s; }
#round-fill { background:linear-gradient(90deg,#c08040,#e0b070,#f0d8a0); box-shadow:0 0 7px rgba(224,176,112,.5); }
#shine-fill { background:linear-gradient(90deg,#4a78a8,#80c0e8,#e0f4ff); box-shadow:0 0 7px rgba(160,210,250,.5); }
.meter-pct { font-size:11px; font-weight:700; width:36px; text-align:right; }
#round-pct { color:#e0b070; } #shine-pct { color:#90c8f0; }
.meter-row.dim { opacity:.3; }
.meter-goal { position:absolute; top:-2px; bottom:-2px; width:2px; background:rgba(255,255,255,.45); }

#view { position:relative; width:100%; aspect-ratio:1/1; max-width:360px; border-radius:18px; overflow:hidden; background:radial-gradient(ellipse at 50% 40%, #1c2230, #0a0d12); box-shadow:inset 0 0 60px rgba(0,0,0,.6); cursor:pointer; }
#view canvas { display:block; width:100%; height:100%; }
#hint { position:absolute; bottom:8px; width:100%; text-align:center; font-size:10px; color:rgba(255,255,255,.3); letter-spacing:2px; pointer-events:none; animation:blink 2.2s ease-in-out infinite; }
#mesh-toggle { position:absolute; top:8px; right:8px; z-index:6; font-size:10px; letter-spacing:1px; padding:5px 10px; border-radius:9px; border:1px solid rgba(140,200,250,.25); background:rgba(10,16,24,.55); color:rgba(200,225,250,.7); cursor:pointer; backdrop-filter:blur(4px); transition:all .2s; }
#mesh-toggle:hover { border-color:rgba(140,200,250,.5); color:#cfe6fa; }
#mesh-toggle.on { background:rgba(80,160,230,.25); border-color:#8fd0ff; color:#eaf6ff; box-shadow:0 0 10px rgba(120,190,250,.4); }
@keyframes blink { 0%,100%{opacity:.35} 50%{opacity:.8} }
#loading { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:12px; color:rgba(255,255,255,.4); letter-spacing:2px; }

.fx { position:absolute; pointer-events:none; z-index:5; }
.fx-txt { font-size:15px; font-weight:700; text-shadow:0 0 8px rgba(0,0,0,.7); animation:fxUp .8s ease-out forwards; white-space:nowrap; }
@keyframes fxUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-48px) scale(.7)} }
.fx-ring { border-radius:50%; border:2px solid; animation:fxRing .5s ease-out forwards; }
@keyframes fxRing { 0%{opacity:.9;transform:translate(-50%,-50%) scale(.3)} 100%{opacity:0;transform:translate(-50%,-50%) scale(1.7)} }
.spark { border-radius:50%; animation:sparkFly .6s ease-out forwards; }
@keyframes sparkFly { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.05)} }

#pts-row { font-size:12px; color:rgba(255,255,255,.5); display:flex; align-items:center; gap:5px; }
#pts-val { font-size:16px; font-weight:700; color:#cfe0f0; }

#tools-title { width:100%; font-size:9px; letter-spacing:2.5px; color:rgba(255,255,255,.2); text-transform:uppercase; padding-left:2px; transition:color .3s; }
#tools { width:100%; display:flex; flex-direction:column; gap:6px; }
.tool { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07); border-radius:10px; padding:9px 12px; display:flex; align-items:center; gap:10px; cursor:pointer; transition:background .15s,border-color .15s,opacity .25s; }
.tool:hover:not(.locked):not(.off) { background:rgba(120,170,220,.1); border-color:rgba(130,180,230,.3); }
.tool.locked { opacity:.3; cursor:not-allowed; }
.tool.off { opacity:.38; }
.tool-ico { font-size:18px; width:22px; text-align:center; flex-shrink:0; }
.tool-info { flex:1; }
.tool-name { font-size:12px; font-weight:700; color:#c2d8ee; }
.tool-desc { font-size:10px; color:rgba(255,255,255,.32); margin-top:1px; }
.tool-cost { font-size:11px; font-weight:700; color:#82b2da; white-space:nowrap; }
.tool-tag { font-size:8px; padding:1px 5px; border-radius:8px; margin-left:4px; vertical-align:middle; }
.tag-forge { background:rgba(200,140,70,.18); color:#e8b878; }
.tag-polish { background:rgba(90,160,230,.18); color:#9cc8f0; }

#banner { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:100; pointer-events:none; opacity:0; }
#banner.show { animation:bannerAnim 2.6s ease-out forwards; }
@keyframes bannerAnim { 0%{opacity:0} 12%{opacity:1} 72%{opacity:1} 100%{opacity:0} }
#banner-inner { text-align:center; padding:22px 40px; background:rgba(8,11,16,.9); border-radius:18px; border:1px solid rgba(140,190,230,.35); box-shadow:0 0 50px rgba(80,160,230,.18); }
#banner-sub { font-size:10px; letter-spacing:4px; color:rgba(160,210,250,.5); text-transform:uppercase; margin-bottom:7px; }
#banner-txt { font-size:24px; font-weight:700; letter-spacing:2px; color:#ddeeff; text-shadow:0 0 20px rgba(120,200,255,.7); }

#finale { position:fixed; inset:0; z-index:200; display:none; align-items:center; justify-content:center; background:rgba(5,8,12,.85); backdrop-filter:blur(3px); }
#finale.show { display:flex; animation:fadeIn .5s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
#finale-card { text-align:center; padding:28px 32px; max-width:320px; background:linear-gradient(160deg, rgba(30,40,55,.95), rgba(15,20,30,.95)); border-radius:22px; border:1px solid rgba(160,210,250,.3); box-shadow:0 0 60px rgba(100,180,250,.25); }
#finale-rank { font-size:62px; font-weight:800; line-height:1; margin:6px 0 4px; text-shadow:0 0 30px currentColor; }
#finale-title { font-size:14px; color:#cfe0f0; letter-spacing:2px; margin-bottom:14px; }
.finale-stat { display:flex; justify-content:space-between; font-size:13px; color:rgba(255,255,255,.6); padding:5px 0; border-bottom:1px solid rgba(255,255,255,.08); }
.finale-stat b { color:#e0f0ff; }
#finale-btn { margin-top:18px; padding:11px 28px; border:none; border-radius:12px; background:linear-gradient(135deg,#4a90d0,#6ab0e0); color:#fff; font-size:13px; font-weight:700; letter-spacing:1px; cursor:pointer; }
#finale-btn:active { transform:scale(.96); }
</style>

<body>
<div class="bg"></div>

<div id="game">
  <div id="phase-pill" class="forge">🔨 叩いて球にする</div>
  <div id="stage-name">くしゃくしゃのアルミ</div>

  <div id="meters">
    <div class="meter-row" id="round-row">
      <div class="meter-ico" id="round-ico">🤏</div><div class="meter-lbl" id="round-lbl">丸まり</div>
      <div class="meter-track"><div class="meter-fill" id="round-fill"></div><div class="meter-goal" id="round-goal" style="left:100%"></div></div>
      <div class="meter-pct" id="round-pct">0%</div>
    </div>
    <div class="meter-row dim" id="shine-row">
      <div class="meter-ico">✨</div><div class="meter-lbl">鏡面度</div>
      <div class="meter-track"><div class="meter-fill" id="shine-fill"></div><div class="meter-goal" style="left:97%"></div></div>
      <div class="meter-pct" id="shine-pct">0%</div>
    </div>
  </div>

  <div id="view">
    <div id="loading">3D読み込み中…</div>
    <button id="mesh-toggle">🔲 メッシュ</button>
    <div id="hint">出っ張りをタップして叩く</div>
  </div>

  <div id="pts-row">🔩 <span id="pts-val">0</span> <span style="opacity:.5">pt</span></div>

  <div id="tools-title">TOOLS — 叩き道具</div>
  <div id="tools"></div>
</div>

<div id="banner"><div id="banner-inner"><div id="banner-sub">PHASE</div><div id="banner-txt"></div></div></div>

<div id="finale"><div id="finale-card">
  <div style="font-size:11px;letter-spacing:3px;color:rgba(160,210,250,.6)">COMPLETE</div>
  <div id="finale-rank">S</div>
  <div id="finale-title">鏡面アルミ玉 完成！</div>
  <div class="finale-stat"><span>真球度</span><b id="fs-round">—</b></div>
  <div class="finale-stat"><span>鏡面度</span><b id="fs-shine">—</b></div>
  <div class="finale-stat"><span>叩いた回数</span><b id="fs-hits">—</b></div>
  <div class="finale-stat"><span>磨いた回数</span><b id="fs-rubs">—</b></div>
  <button id="finale-btn">もう一度作る</button>
</div></div>

<script type="module">
import * as THREE from 'three';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const $=id=>document.getElementById(id);

// ════════════════════════════════════════════
//  GAME STATE
// ════════════════════════════════════════════
let G;
function freshState(){
  return { phase:'crumple', crumpleT:0, pts:0, hits:0, rubs:0,
    power:9, twin:false, autoHammer:0,
    gritIdx:0, brush:1, autoPolish:0,
    roundness:0, shine:0 };
}
const GRITS=[
  { name:'#120 粗目',  lum:138, speed:0.55 },
  { name:'#400 中目',  lum:172, speed:0.5  },
  { name:'#1000 細目', lum:206, speed:0.45 },
  { name:'#3000 仕上', lum:234, speed:0.4  },
  { name:'ピカール',   lum:255, speed:0.38 },
];

const TOOLS=[
  { id:'pw', tag:'forge', ico:'🔨', name:'重いハンマー', desc:'叩く威力 +6', base:45, mult:1.5, can:()=>true, buy(){ G.power+=6; } },
  { id:'tw', tag:'forge', ico:'🙌', name:'両手叩き', desc:'1タップで2連打', base:220, mult:1, once:true, can:()=>!G.twin, buy(){ G.twin=true; } },
  { id:'ah', tag:'forge', ico:'⚙️', name:'自動ハンマー機', desc:'出っ張りを自動で叩く', base:130, mult:1.7, can:()=>true, buy(){ G.autoHammer+=1; } },
  { id:'gr', tag:'polish', ico:'📄', name:'番手を上げる', desc:()=>G.gritIdx>=GRITS.length-1?'最高番手':`→ ${GRITS[G.gritIdx+1].name}`, base:90, mult:2.3, can:()=>G.gritIdx<GRITS.length-1, buy(){ G.gritIdx++; } },
  { id:'br', tag:'polish', ico:'🧽', name:'大きい当て布', desc:'磨き範囲 +40%', base:110, mult:1.6, can:()=>true, buy(){ G.brush+=0.4; } },
  { id:'ap', tag:'polish', ico:'🌀', name:'自動ポリッシャー', desc:'表面を自動で磨く', base:170, mult:1.7, can:()=>true, buy(){ G.autoPolish+=1; } },
];

// ════════════════════════════════════════════
//  THREE.JS SETUP
// ════════════════════════════════════════════
const view=$('view');
let renderer, scene, camera, ball, geo, mat, wireMesh;
let dirs, disp, disp0Mean, vertCount, flatX, flatY, flatZ, targetDisp;
let roughCanvas, roughCtx, roughTex, sampleCanvas, sampleCtx;
const raycaster=new THREE.Raycaster();
const ndc=new THREE.Vector2();
let punch=0;                        // 叩き反応(squash)
let rotVelX=0, rotVelY=0;           // 回転の慣性（くるくる）
let grabbed=false, dragging=false, lastPX=0, lastPY=0;
const SEG=112, RBASE=1;

function initThree(){
  renderer=new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(2, window.devicePixelRatio||1));
  resizeRenderer();
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.05;
  renderer.outputColorSpace=THREE.SRGBColorSpace;
  view.appendChild(renderer.domElement);

  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(38, 1, 0.1, 100);
  camera.position.set(0,0,3.3);

  // 環境マップ（部屋＝金属に映り込む）
  const pmrem=new THREE.PMREMGenerator(renderer);
  scene.environment=pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

  // ライト（鋭いハイライト用）
  const key=new THREE.DirectionalLight(0xffffff, 2.2); key.position.set(2,3,4); scene.add(key);
  const rim=new THREE.DirectionalLight(0x88bbff, 1.1); rim.position.set(-3,-1,-2); scene.add(rim);
  scene.add(new THREE.AmbientLight(0xffffff, 0.25));

  // ジオメトリ
  geo=new THREE.SphereGeometry(RBASE, SEG, SEG);
  vertCount=geo.attributes.position.count;
  dirs=new Float32Array(vertCount*3);
  disp=new Float32Array(vertCount);
  const p=geo.attributes.position;
  for(let i=0;i<vertCount;i++){
    const x=p.getX(i), y=p.getY(i), z=p.getZ(i);
    const l=Math.hypot(x,y,z)||1;
    dirs[i*3]=x/l; dirs[i*3+1]=y/l; dirs[i*3+2]=z/l;
  }
  // 平面（ペラペラのホイル）レイアウト：球面UVを長方形シートに展開
  const uv=geo.attributes.uv;
  flatX=new Float32Array(vertCount); flatY=new Float32Array(vertCount); flatZ=new Float32Array(vertCount);
  targetDisp=new Float32Array(vertCount);
  const SW=2.45, SH=1.85;
  for(let i=0;i<vertCount;i++){
    const u=uv.getX(i), v=uv.getY(i);
    flatX[i]=(u-0.5)*SW;
    flatY[i]=(v-0.5)*SH;
    flatZ[i]=(Math.random()-0.5)*0.07; // 薄いしわ（ホイルの質感）
  }
  // 頂点カラー（出っ張り可視化用）
  geo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(vertCount*3), 3));

  // 曇り→鏡面 用 roughnessMap
  roughCanvas=document.createElement('canvas'); roughCanvas.width=1024; roughCanvas.height=512;
  roughCtx=roughCanvas.getContext('2d');
  sampleCanvas=document.createElement('canvas'); sampleCanvas.width=96; sampleCanvas.height=48;
  sampleCtx=sampleCanvas.getContext('2d');
  roughTex=new THREE.CanvasTexture(roughCanvas);
  roughTex.colorSpace=THREE.NoColorSpace;

  mat=new THREE.MeshStandardMaterial({
    color:0xffffff, metalness:0.75, roughness:0.62,
    vertexColors:true, envMapIntensity:1.1,
  });
  ball=new THREE.Mesh(geo, mat);
  scene.add(ball);

  // ── メッシュ（ワイヤーフレーム）オーバーレイ。同じジオメトリを共有するので叩くと一緒に変形する ──
  const wireMat=new THREE.MeshBasicMaterial({ color:0x9fd6ff, wireframe:true, transparent:true, opacity:0.5 });
  wireMesh=new THREE.Mesh(geo, wireMat);
  wireMesh.scale.setScalar(1.003);
  wireMesh.visible=false;
  ball.add(wireMesh);

  // トグルボタン（クリックが叩き/磨きに伝播しないよう stopPropagation）
  const mtBtn=$('mesh-toggle');
  mtBtn.addEventListener('pointerdown', e=>e.stopPropagation());
  mtBtn.addEventListener('click', e=>{
    e.stopPropagation();
    wireMesh.visible=!wireMesh.visible;
    mtBtn.classList.toggle('on', wireMesh.visible);
    // メッシュを見やすくするため金属面を少し落ち着かせる
    mat.envMapIntensity = wireMesh.visible ? 0.5 : 1.1;
  });

  window.addEventListener('resize', resizeRenderer);
  $('loading').style.display='none';
}
function resizeRenderer(){
  const w=view.clientWidth, h=view.clientHeight;
  renderer.setSize(w,h,false);
  if(camera){ camera.aspect=w/h; camera.updateProjectionMatrix(); }
}

// ── 形状適用 ──
function applyShape(){
  const p=geo.attributes.position;
  for(let i=0;i<vertCount;i++){
    const r=RBASE+disp[i];
    p.setXYZ(i, dirs[i*3]*r, dirs[i*3+1]*r, dirs[i*3+2]*r);
  }
  p.needsUpdate=true;
  geo.computeVertexNormals();
}
// ── 頂点カラー（出っ張りをオレンジに）──
const C_SIL=[0.82,0.84,0.88], C_HOT=[1.0,0.5,0.15];
function applyColors(){
  const c=geo.attributes.color;
  for(let i=0;i<vertCount;i++){
    let t = G.phase==='forge' ? clamp(disp[i]/0.16,0,1) : 0;
    c.setXYZ(i, lerp(C_SIL[0],C_HOT[0],t*0.85), lerp(C_SIL[1],C_HOT[1],t*0.85), lerp(C_SIL[2],C_HOT[2],t*0.85));
  }
  c.needsUpdate=true;
}

// ── しわくちゃの凹凸（ガウシアン出っ張りの和）を生成 → targetDisp ──
function genWrinkles(){
  const M=14;
  const bdir=[], bamp=[];
  for(let k=0;k<M;k++){
    const u=Math.random()*2-1, th=Math.random()*Math.PI*2, s=Math.sqrt(1-u*u);
    bdir.push([s*Math.cos(th), s*Math.sin(th), u]);
    bamp.push(0.06+Math.random()*0.14);
  }
  let sum=0;
  for(let i=0;i<vertCount;i++){
    let d=0;
    const dx=dirs[i*3],dy=dirs[i*3+1],dz=dirs[i*3+2];
    for(let k=0;k<M;k++){
      const dot=clamp(dx*bdir[k][0]+dy*bdir[k][1]+dz*bdir[k][2],-1,1);
      const ang=Math.acos(dot);
      d+=bamp[k]*Math.exp(-(ang*ang)/(2*0.55*0.55));
    }
    targetDisp[i]=d; sum+=d;
  }
  disp0Mean=sum/vertCount;
}

// ── 丸めフェーズ：平面 ⇄ しわくちゃ球 を crumpleT で補間 ──
function applyCrumpleShape(){
  const p=geo.attributes.position;
  const t=G.crumpleT, e=t*t*(3-2*t); // smoothstep
  for(let i=0;i<vertCount;i++){
    const r=RBASE+targetDisp[i]*t;
    const sx=dirs[i*3]*r, sy=dirs[i*3+1]*r, sz=dirs[i*3+2]*r;
    p.setXYZ(i, lerp(flatX[i],sx,e), lerp(flatY[i],sy,e), lerp(flatZ[i],sz,e));
  }
  p.needsUpdate=true; geo.computeVertexNormals();
}
function initCrumple(){
  genWrinkles();
  G.crumpleT=0;
  for(let i=0;i<vertCount;i++) disp[i]=0;
  applyCrumpleShape(); applyColors();
}
function crumpleStep(vx,vy){
  G.crumpleT=Math.min(1, G.crumpleT+0.14);
  // 丸めるたびに少しランダムなしわを足す（くしゃくしゃ感）
  const M=3;
  for(let m=0;m<M;m++){
    const u=Math.random()*2-1, th=Math.random()*Math.PI*2, s=Math.sqrt(1-u*u);
    const bx=s*Math.cos(th), by=s*Math.sin(th), bz=u, amp=0.03+Math.random()*0.05;
    for(let i=0;i<vertCount;i+=2){
      const dot=clamp(dirs[i*3]*bx+dirs[i*3+1]*by+dirs[i*3+2]*bz,-1,1);
      const ang=Math.acos(dot);
      targetDisp[i]+=amp*Math.exp(-(ang*ang)/(2*0.5*0.5));
    }
  }
  G.pts+=3;
  applyCrumpleShape();
  punch=1; rotVelY+=(Math.random()*2-1)*0.018;
  sfxCrinkle();
  fxSparks(vx,vy,['#c9d2db','#aeb8c2','#e8eef4'],6);
  fxText(vx,vy,'くしゃっ','#cbd6e2');
  if(G.crumpleT>=1) enterForge();
  refreshUI();
}
function enterForge(){
  G.phase='forge';
  let sum=0; for(let i=0;i<vertCount;i++){ disp[i]=targetDisp[i]; sum+=Math.abs(targetDisp[i]); }
  disp0Mean=sum/vertCount;
  applyShape(); applyColors(); recalcRound();
  banner('叩いて真球へ',' FORGE PHASE ');
  $('phase-pill').className='forge'; $('phase-pill').textContent='🔨 叩いて球にする';
  $('hint').textContent='タップで叩く / ドラッグで回す';
  $('round-ico').textContent='⚪'; $('round-lbl').textContent='真球度'; $('round-goal').style.left='85%';
  refreshUI();
}
function recalcRound(){
  let s=0; for(let i=0;i<vertCount;i++) s+=Math.abs(disp[i]);
  const mean=s/vertCount;
  G.roundness=clamp(1-mean/disp0Mean, 0, 1);
}

// ── 叩く（頂点を均す）──
const _wp=new THREE.Vector3(), _lp=new THREE.Vector3();
function hammerLocal(ldir, screenX, screenY){
  const power=G.power/100;
  const RAD=0.42;            // 影響角半径
  let removed=0, peak=0;
  // 中心領域を平らに
  for(let i=0;i<vertCount;i++){
    const dot=clamp(dirs[i*3]*ldir.x+dirs[i*3+1]*ldir.y+dirs[i*3+2]*ldir.z,-1,1);
    const ang=Math.acos(dot);
    if(ang<RAD){
      const w=1-ang/RAD;
      const cut=disp[i]*0.55*w*Math.min(1,power*12);
      disp[i]-=cut; removed+=cut;
      if(disp[i]>peak) peak=disp[i];
    }
  }
  // 材料が外周リングへ少し逃げる（whack-a-mole）
  if(removed>0){
    let ringCount=0, ringIdx=[];
    for(let i=0;i<vertCount;i++){
      const dot=clamp(dirs[i*3]*ldir.x+dirs[i*3+1]*ldir.y+dirs[i*3+2]*ldir.z,-1,1);
      const ang=Math.acos(dot);
      if(ang>=RAD && ang<RAD*1.7){ ringIdx.push(i); ringCount++; }
    }
    const give=removed*0.28/Math.max(1,ringCount);
    for(const i of ringIdx) disp[i]+=give;
  }
  recalcRound();
  applyShape(); applyColors();
  G.hits++;
  G.pts+=Math.max(1, Math.ceil(removed*900));
  // 反応
  punch=1; rotVelY+=(Math.random()*2-1)*0.022;
  const hit=removed>0.002;
  sfxHammer(hit);
  if(hit){ fxText(screenX,screenY,'カンッ!','#ffd89a'); fxRing(screenX,screenY,'rgba(255,180,90,.85)'); fxSparks(screenX,screenY,['#ffd8a0','#ffb060','#fff0d0'],10); }
  else { fxText(screenX,screenY,'ｺﾂﾝ','#a0b0c0'); fxSparks(screenX,screenY,['#90a0b0','#c0c8d0'],4); }
  if(G.roundness>=0.85) toPolish();
  refreshUI();
}

// ════════════════════════════════════════════
//  POLISH
// ════════════════════════════════════════════
function initPolishMap(){
  // 曇りムラ：暗グレー地に明暗の斑（roughnessMap, 明=粗い=曇り）
  roughCtx.fillStyle='#d2d2d2'; roughCtx.fillRect(0,0,1024,512); // roughness~0.82
  for(let k=0;k<260;k++){
    const x=Math.random()*1024, y=Math.random()*512, r=18+Math.random()*46;
    const a=0.10+Math.random()*0.18;
    const g=roughCtx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,`rgba(255,255,255,${a})`); g.addColorStop(1,'rgba(255,255,255,0)');
    roughCtx.fillStyle=g; roughCtx.beginPath(); roughCtx.arc(x,y,r,0,Math.PI*2); roughCtx.fill();
  }
  roughTex.needsUpdate=true;
  recalcShine();
}
const SHINE_LO=1-0.86, SHINE_HI=1-0.06; // 生shineの曇り/鏡面基準
function recalcShine(){
  sampleCtx.drawImage(roughCanvas,0,0,96,48);
  const d=sampleCtx.getImageData(0,0,96,48).data;
  let s=0; const n=96*48;
  for(let i=0;i<d.length;i+=4) s+=d[i];
  const meanLum=s/n;             // 0..255 （明=粗い曇り）
  const raw=1-meanLum/255;       // 大きいほど磨けてる
  G.shine=clamp((raw-SHINE_LO)/(SHINE_HI-SHINE_LO),0,1);
}
function polishUV(uv, screenX, screenY){
  const grit=GRITS[G.gritIdx];
  const x=uv.x*1024, y=(1-uv.y)*512;
  const R=46*G.brush;
  // darken合成で「現在より暗く（=滑らかに）」描く。番手で到達できる暗さが決まる
  roughCtx.globalCompositeOperation='darken';
  const g=roughCtx.createRadialGradient(x,y,0,x,y,R);
  const lum=grit.lum, a=grit.speed;
  g.addColorStop(0,`rgba(${lum},${lum},${lum},${a})`);
  g.addColorStop(0.6,`rgba(${lum},${lum},${lum},${a*0.5})`);
  g.addColorStop(1,`rgba(${lum},${lum},${lum},0)`);
  roughCtx.fillStyle=g; roughCtx.beginPath(); roughCtx.arc(x,y,R,0,Math.PI*2); roughCtx.fill();
  // 横方向の継ぎ目をまたぐ場合の補助描画
  if(x<R){ roughCtx.beginPath(); const g2=roughCtx.createRadialGradient(x+1024,y,0,x+1024,y,R); g2.addColorStop(0,`rgba(${lum},${lum},${lum},${a})`); g2.addColorStop(1,`rgba(${lum},${lum},${lum},0)`); roughCtx.fillStyle=g2; roughCtx.arc(x+1024,y,R,0,Math.PI*2); roughCtx.fill(); }
  else if(x>1024-R){ roughCtx.beginPath(); const g3=roughCtx.createRadialGradient(x-1024,y,0,x-1024,y,R); g3.addColorStop(0,`rgba(${lum},${lum},${lum},${a})`); g3.addColorStop(1,`rgba(${lum},${lum},${lum},0)`); roughCtx.fillStyle=g3; roughCtx.arc(x-1024,y,R,0,Math.PI*2); roughCtx.fill(); }
  roughCtx.globalCompositeOperation='source-over';
  roughTex.needsUpdate=true;

  G.rubs++;
  G.pts+=2;
  punch=0.25;
  if(G.rubs%4===0) sfxRub();
  if(screenX!=null) fxSparks(screenX,screenY,['#d0e8f8','#eef6ff','#fff'],3);
}

// ════════════════════════════════════════════
//  PHASE TRANSITIONS
// ════════════════════════════════════════════
function toPolish(){
  if(G.phase!=='forge') return;
  G.phase='polish';
  // 仕上げのため凹凸をほぼ均し、純金属マテリアルへ
  for(let i=0;i<vertCount;i++) disp[i]*=0.35;
  applyShape();
  initPolishMap();
  mat.vertexColors=false; mat.color.set(0xf2f5f8);
  mat.metalness=1.0; mat.roughness=1.0; mat.roughnessMap=roughTex;
  mat.needsUpdate=true;
  banner('磨きへ！',' POLISH PHASE ');
  $('phase-pill').className='polish'; $('phase-pill').textContent='✨ 磨いて鏡面にする';
  $('hint').textContent='タップで磨く / ドラッグで回す';
  $('round-row').classList.add('dim'); $('shine-row').classList.remove('dim');
  $('tools-title').textContent='TOOLS — 磨き道具';
  buildTools();
}
function finish(){
  if(G.phase==='done') return;
  G.phase='done'; sfxShine();
  $('phase-pill').className='done'; $('phase-pill').textContent='🏆 完成！';
  $('hint').textContent='鏡面アルミ玉 完成';
  const score=G.roundness*0.4+G.shine*0.6;
  let rank,color;
  if(G.roundness>=0.95&&G.shine>=0.995){ rank='SSS'; color='#ffe680'; }
  else if(score>=0.96){ rank='SS'; color='#a0f0ff'; }
  else if(score>=0.93){ rank='S'; color='#90e0ff'; }
  else if(score>=0.89){ rank='A'; color='#90ffb0'; }
  else if(score>=0.84){ rank='B'; color='#d0e0a0'; }
  else { rank='C'; color='#e0c090'; }
  setTimeout(()=>{
    $('finale-rank').textContent=rank; $('finale-rank').style.color=color;
    $('fs-round').textContent=Math.round(G.roundness*100)+'%';
    $('fs-shine').textContent=Math.round(G.shine*100)+'%';
    $('fs-hits').textContent=G.hits+'回'; $('fs-rubs').textContent=G.rubs+'回';
    $('finale').className='show';
  },900);
}
function banner(big,sub){
  const el=$('banner'); $('banner-txt').textContent=big; $('banner-sub').textContent=sub;
  el.className=''; void el.offsetWidth; el.className='show';
}

// ════════════════════════════════════════════
//  INPUT（タップ＝叩く / ドラッグ＝磨く）
// ════════════════════════════════════════════
let pointerDown=false, moved=false, downX=0, downY=0;
function setNdc(e){
  const r=renderer.domElement.getBoundingClientRect();
  ndc.x=((e.clientX-r.left)/r.width)*2-1;
  ndc.y=-((e.clientY-r.top)/r.height)*2+1;
  return r;
}
function rayHit(){
  raycaster.setFromCamera(ndc, camera);
  const hits=raycaster.intersectObject(ball,false);
  return hits.length?hits[0]:null;
}
function viewXY(e){ const r=view.getBoundingClientRect(); return [e.clientX-r.left, e.clientY-r.top]; }

const ROT=0.009; // ドラッグ感度
view.addEventListener('pointerdown', e=>{
  e.preventDefault(); initAudio();
  pointerDown=true; moved=false; dragging=false; grabbed=true;
  downX=e.clientX; downY=e.clientY; lastPX=e.clientX; lastPY=e.clientY;
  rotVelX=0; rotVelY=0; // つかんだら慣性を止める
});
view.addEventListener('pointermove', e=>{
  if(!pointerDown) return;
  const dx=e.clientX-lastPX, dy=e.clientY-lastPY;
  lastPX=e.clientX; lastPY=e.clientY;
  if(Math.hypot(e.clientX-downX, e.clientY-downY)>5) dragging=true, moved=true;
  if(dragging && ball){
    // ドラッグで自由回転（くるくる）。離すと慣性が残る
    ball.rotation.y += dx*ROT;
    ball.rotation.x += dy*ROT;
    rotVelY=dx*ROT; rotVelX=dy*ROT;
  }
});
window.addEventListener('pointerup', e=>{
  if(!pointerDown){ return; } pointerDown=false; grabbed=false;
  if(dragging){ return; } // ドラッグ=回転だったので操作は出さない
  // タップ＝各フェーズの操作
  if(G.phase==='crumple'){
    const [vx,vy]=viewXY(e); crumpleStep(vx,vy);
  } else if(G.phase==='forge'){
    setNdc(e); const h=rayHit();
    if(h){
      _lp.copy(h.point); ball.worldToLocal(_lp); _lp.normalize();
      const [vx,vy]=viewXY(e);
      hammerLocal(_lp, vx, vy);
      if(G.twin){ const j=_lp.clone(); j.x+=(Math.random()*.1-.05); j.y+=(Math.random()*.1-.05); j.normalize(); setTimeout(()=>{ if(G.phase==='forge') hammerLocal(j,vx+8,vy-6); },90); }
    }
  } else if(G.phase==='polish'){
    doPolishAt(e);
  }
});
view.addEventListener('pointercancel',()=>{ pointerDown=false; grabbed=false; });

function doPolishAt(e){
  setNdc(e); const h=rayHit();
  if(h && h.uv){ const [vx,vy]=viewXY(e); polishUV(h.uv, vx, vy); recalcShine();
    if(G.shine>=0.97) finish(); refreshUI(); }
}

// ════════════════════════════════════════════
//  AUTO TOOLS
// ════════════════════════════════════════════
setInterval(()=>{
  if(G.phase==='forge' && G.autoHammer>0){
    // 最も出っ張った頂点方向を自動で叩く
    let mi=0,mv=-1;
    for(let i=0;i<vertCount;i+=7){ if(disp[i]>mv){mv=disp[i];mi=i;} }
    if(mv>0.04){
      _lp.set(dirs[mi*3],dirs[mi*3+1],dirs[mi*3+2]);
      const power=(G.power*0.5*G.autoHammer)/100, RAD=0.42;
      let removed=0;
      for(let i=0;i<vertCount;i++){
        const dot=clamp(dirs[i*3]*_lp.x+dirs[i*3+1]*_lp.y+dirs[i*3+2]*_lp.z,-1,1);
        const ang=Math.acos(dot);
        if(ang<RAD){ const cut=disp[i]*0.4*(1-ang/RAD)*Math.min(1,power*12); disp[i]-=cut; removed+=cut; }
      }
      G.pts+=Math.ceil(removed*500);
      recalcRound(); applyShape(); applyColors();
      if(G.roundness>=0.85) toPolish(); refreshUI();
    }
  } else if(G.phase==='polish' && G.autoPolish>0){
    const grit=GRITS[G.gritIdx];
    for(let k=0;k<G.autoPolish*3;k++){
      const x=Math.random()*1024, y=Math.random()*512, R=40;
      roughCtx.globalCompositeOperation='darken';
      const g=roughCtx.createRadialGradient(x,y,0,x,y,R);
      g.addColorStop(0,`rgba(${grit.lum},${grit.lum},${grit.lum},${grit.speed*0.6})`);
      g.addColorStop(1,`rgba(${grit.lum},${grit.lum},${grit.lum},0)`);
      roughCtx.fillStyle=g; roughCtx.beginPath(); roughCtx.arc(x,y,R,0,Math.PI*2); roughCtx.fill();
      roughCtx.globalCompositeOperation='source-over';
    }
    roughTex.needsUpdate=true; recalcShine();
    if(G.shine>=0.97) finish(); refreshUI();
  }
}, 650);

// ════════════════════════════════════════════
//  AUDIO
// ════════════════════════════════════════════
let actx=null;
function initAudio(){ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); }
function sfxHammer(hit){
  if(!actx) return;
  const o=actx.createOscillator(), g=actx.createGain(); o.connect(g); g.connect(actx.destination);
  o.type='square'; const f=hit?720:320;
  o.frequency.setValueAtTime(f+Math.random()*120, actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(80, actx.currentTime+.07);
  g.gain.setValueAtTime(hit?.07:.045, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001, actx.currentTime+.1);
  o.start(); o.stop(actx.currentTime+.13);
  if(hit){ const o2=actx.createOscillator(), g2=actx.createGain(); o2.connect(g2); g2.connect(actx.destination);
    o2.type='triangle'; o2.frequency.setValueAtTime(1450+Math.random()*300,actx.currentTime);
    g2.gain.setValueAtTime(.025,actx.currentTime); g2.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.18);
    o2.start(); o2.stop(actx.currentTime+.2); }
}
function sfxRub(){ if(!actx) return;
  const o=actx.createOscillator(), g=actx.createGain(), f=actx.createBiquadFilter();
  o.connect(f); f.connect(g); g.connect(actx.destination);
  o.type='sawtooth'; f.type='bandpass'; f.frequency.value=2200+Math.random()*1500; f.Q.value=2;
  o.frequency.setValueAtTime(1000+Math.random()*400,actx.currentTime);
  g.gain.setValueAtTime(.018,actx.currentTime); g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.09);
  o.start(); o.stop(actx.currentTime+.1);
}
function sfxShine(){ if(!actx) return;
  [880,1320,1760].forEach((fr,i)=>{ const o=actx.createOscillator(), g=actx.createGain(); o.connect(g); g.connect(actx.destination);
    o.type='sine'; o.frequency.value=fr; const t0=actx.currentTime+i*0.08;
    g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(.05,t0+.02); g.gain.exponentialRampToValueAtTime(.001,t0+.4);
    o.start(t0); o.stop(t0+.45); });
}
function sfxCrinkle(){ if(!actx) return;
  const dur=0.2, sr=actx.sampleRate;
  const buf=actx.createBuffer(1, Math.floor(sr*dur), sr);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.4);
  const src=actx.createBufferSource(); src.buffer=buf;
  const f=actx.createBiquadFilter(); f.type='highpass'; f.frequency.value=2600;
  const g=actx.createGain(); g.gain.value=0.09;
  src.connect(f); f.connect(g); g.connect(actx.destination);
  src.start();
}

function fxText(x,y,t,c){ const e=document.createElement('div'); e.className='fx fx-txt'; e.textContent=t; e.style.color=c; e.style.left=(x-18)+'px'; e.style.top=(y-12)+'px'; view.appendChild(e); setTimeout(()=>e.remove(),800); }
function fxRing(x,y,c){ const e=document.createElement('div'); e.className='fx fx-ring'; e.style.cssText+=`left:${x}px;top:${y}px;width:44px;height:44px;border-color:${c};`; view.appendChild(e); setTimeout(()=>e.remove(),500); }
function fxSparks(x,y,cols,n){ for(let i=0;i<n;i++){ const e=document.createElement('div'); e.className='fx spark'; const a=Math.random()*Math.PI*2, d=26+Math.random()*44, s=2+Math.random()*4; e.style.cssText+=`left:${x}px;top:${y}px;width:${s}px;height:${s}px;background:${cols[i%cols.length]};--dx:${Math.cos(a)*d}px;--dy:${Math.sin(a)*d-18}px;box-shadow:0 0 4px ${cols[0]};`; view.appendChild(e); setTimeout(()=>e.remove(),620); } }

//  TOOLS UI
// ════════════════════════════════════════════
function toolCost(t){ const lvl=(G._lvl&&G._lvl[t.id])||0; return Math.floor(t.base*Math.pow(t.mult,lvl)); }
function buildTools(){
  if(!G._lvl) G._lvl={};
  const box=$('tools'); box.innerHTML='';
  const sorted=[...TOOLS].sort((a,b)=>((a.tag===G.phase?0:1)-(b.tag===G.phase?0:1)));
  for(const t of sorted){
    if(!t.can()) continue;
    const cost=toolCost(t);
    const irrelevant=G.phase==='crumple'||(G.phase==='forge'&&t.tag==='polish')||(G.phase==='polish'&&t.tag==='forge')||G.phase==='done';
    const locked=G.pts<cost;
    const row=document.createElement('div');
    row.className='tool'+(locked?' locked':'')+(irrelevant?' off':'');
    const desc=typeof t.desc==='function'?t.desc():t.desc;
    row.innerHTML=`<div class="tool-ico">${t.ico}</div><div class="tool-info"><div class="tool-name">${t.name}<span class="tool-tag ${t.tag==='forge'?'tag-forge':'tag-polish'}">${t.tag==='forge'?'叩き':'磨き'}</span></div><div class="tool-desc">${desc}</div></div><div class="tool-cost">🔩 ${fmt(cost)}</div>`;
    row.addEventListener('click',()=>{ const c=toolCost(t); if(G.pts<c||!t.can())return; G.pts-=c; G._lvl[t.id]=(G._lvl[t.id]||0)+1; t.buy(); buildTools(); refreshUI(); });
    box.appendChild(row);
  }
}

const NAMES_FORGE=[[0,'くしゃくしゃのアルミ'],[0.3,'でこぼこの塊'],[0.5,'だんだん丸く'],[0.7,'いい球になってきた'],[0.82,'あと少しで真球！']];
const NAMES_POLISH=[[0,'くすんだ金属の玉'],[0.3,'ムラが減ってきた'],[0.55,'うっすら光沢が'],[0.78,'かなりピカピカ'],[0.92,'もう少しで鏡面！']];
const NAMES_CRUMPLE=[[0,'ペラペラのアルミホイル'],[0.2,'端を折り込む'],[0.45,'丸めていく'],[0.7,'かたまってきた'],[0.9,'しわくちゃの球！']];
function stageName(){
  if(G.phase==='done') return '鏡面アルミ玉 ✦';
  let arr,v;
  if(G.phase==='crumple'){ arr=NAMES_CRUMPLE; v=G.crumpleT; }
  else if(G.phase==='forge'){ arr=NAMES_FORGE; v=G.roundness; }
  else { arr=NAMES_POLISH; v=G.shine; }
  let nm=arr[0][1]; for(const [t,n] of arr) if(v>=t) nm=n; return nm;
}
function refreshUI(){
  $('pts-val').textContent=fmt(G.pts);
  const rv = G.phase==='crumple' ? G.crumpleT : G.roundness;
  $('round-fill').style.width=(rv*100)+'%'; $('round-pct').textContent=Math.round(rv*100)+'%';
  $('shine-fill').style.width=(G.shine*100)+'%'; $('shine-pct').textContent=Math.round(G.shine*100)+'%';
  $('stage-name').textContent=stageName();
  refreshToolsState();
}
let lastSig='';
function refreshToolsState(){ const sig=G.phase+'|'+G.gritIdx+'|'+G.twin+'|'+TOOLS.map(t=>t.can()?toolCost(t):'x').join(',')+'|'+(G.pts>=minCost()?'a':'b'); if(sig!==lastSig){ lastSig=sig; buildTools(); } }
function minCost(){ let m=Infinity; for(const t of TOOLS) if(t.can()) m=Math.min(m,toolCost(t)); return m; }
function fmt(n){ if(n>=1e6)return(n/1e6).toFixed(1)+'M'; if(n>=1e3)return(n/1e3).toFixed(1)+'K'; return Math.floor(n)+''; }

// ════════════════════════════════════════════
//  LOOP
// ════════════════════════════════════════════
let lastT=performance.now();
function animate(now){
  const dt=Math.min((now-lastT)/1000,.05); lastT=now;
  // ドラッグで自由回転（くるくる）。離すと慣性 → ゆるやかなアイドル回転
  if(ball){
    if(!grabbed){
      ball.rotation.y += rotVelY + 0.0016;  // 慣性＋わずかなアイドル回転
      ball.rotation.x += rotVelX;
      rotVelX*=Math.pow(0.06,dt); rotVelY*=Math.pow(0.06,dt);
      if(Math.abs(rotVelX)<1e-4) rotVelX=0;
      if(Math.abs(rotVelY)<1e-4) rotVelY=0;
      // 上下の回転は見やすい範囲に緩く制限
      ball.rotation.x=clamp(ball.rotation.x,-1.2,1.2);
    }
    const sq=1-punch*0.06;
    ball.scale.set(1+punch*0.04, sq, 1+punch*0.04);
    punch*=Math.pow(0.0005,dt);
    renderer.render(scene,camera);
  }
  requestAnimationFrame(animate);
}

// ════════════════════════════════════════════
//  START
// ════════════════════════════════════════════
function start(){
  G=freshState();
  if(mat){ mat.vertexColors=true; mat.color.set(0xffffff); mat.metalness=0.62; mat.roughness=0.5; mat.roughnessMap=null; mat.envMapIntensity=1.1; mat.needsUpdate=true; }
  initCrumple();
  $('phase-pill').className='crumple'; $('phase-pill').textContent='🤏 平面を丸める';
  $('hint').textContent='タップで丸める / ドラッグで回す';
  $('round-ico').textContent='🤏'; $('round-lbl').textContent='丸まり'; $('round-goal').style.left='100%';
  $('round-row').classList.remove('dim'); $('shine-row').classList.add('dim');
  $('tools-title').textContent='TOOLS';
  $('finale').className=''; lastSig='';
  buildTools(); refreshUI();
}
$('finale-btn').addEventListener('click', start);

// ── boot ──
try {
  initThree();
  start();
  requestAnimationFrame(animate);
} catch(err){
  $('loading').textContent='3D初期化エラー: '+err.message;
  console.error(err);
}
</script>
